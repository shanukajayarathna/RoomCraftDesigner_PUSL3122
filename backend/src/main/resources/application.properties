# RoomCraft Designer - Application Configuration
spring.application.name=RoomCraft Designer

# === Database (H2 - file based, persists between restarts) ===
spring.datasource.url=jdbc:h2:file:${user.home}/roomcraft-data/db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# === JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# === Server ===
server.port=8080

# === JWT ===
app.jwt.secret=RoomCraftDesignerSecretKey2024VeryLongSecretKeyForJWTSigning
app.jwt.expiration=86400000

# === CORS (backup — main CORS handled by Vite proxy) ===
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173

# === Logging — show startup errors clearly ===
logging.level.org.springframework=INFO
logging.level.com.roomcraft=DEBUG
logging.level.org.springframework.security=DEBUG
